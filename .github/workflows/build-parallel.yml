name: Build parallel.so

# Builds two parallel.so artefacts against the ZTS libphp.so
# released by sj-i/ffi-zts:
#   - extensions/no-debug-zts-<api>/parallel.so  (vanilla)
#   - extensions/ffi-zts/parallel.so             (DT_NEEDED libphp.so)
# and packs them into the per-host release tarball that
# SjI\FfiZts\Parallel\Installer downloads.
#
# Triggered manually (workflow_dispatch) or on a tag matching
# parallel-php*.

on:
  workflow_dispatch:
    inputs:
      parallel-version:
        description: 'pecl/parallel version to build'
        default: '1.2.12'
        required: true
      libphp-tag:
        description: 'sj-i/ffi-zts release tag holding the matching libphp.so'
        default: 'libphp-8.4'
        required: true
      release-tag:
        description: 'Release tag to attach the artefact to'
        default: ''
        required: false
  push:
    tags:
      - 'parallel-php*'

concurrency:
  group: build-parallel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PARALLEL_VERSION: ${{ github.event.inputs.parallel-version || '1.2.12' }}
      LIBPHP_TAG:       ${{ github.event.inputs.libphp-tag || 'libphp-8.4' }}
      # libphp.so in sj-i/ffi-zts was configured with
      # --prefix=/home/runner/work/ffi-zts/ffi-zts/php-zts, and
      # `phpize` / `php-config` have that path baked in (phpize's
      # first check is that $prefix/include/php/main/php.h exists).
      # Reproduce the same directory tree here so the hardcoded
      # lookups resolve. `/home/runner/work/` is runner-writable on
      # GitHub-hosted ubuntu runners, so no sudo is needed.
      PREFIX:    /home/runner/work/ffi-zts/ffi-zts/php-zts
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential autoconf bison re2c pkg-config

      - name: Fetch libphp.so + toolchain from sj-i/ffi-zts release
        run: |
          set -euxo pipefail
          arch=$(uname -m)
          phpabi=$(echo "$LIBPHP_TAG" | sed 's/^libphp-//')
          asset="libphp-${phpabi}-${arch}-glibc.tar.gz"
          mkdir -p "$PREFIX"
          curl -sSLfo libphp.tgz \
              "https://github.com/sj-i/ffi-zts/releases/download/${LIBPHP_TAG}/${asset}"
          tar xzf libphp.tgz -C "$PREFIX"
          # Tarball ships libphp.so at the root and a parallel set of
          # bin/, include/, lib/php trees from the ZTS install. Move
          # libphp.so into lib/ so phpize / php-config see the same
          # layout as a normal `make install` PREFIX.
          if [ -f "$PREFIX/libphp.so" ]; then
              mv "$PREFIX/libphp.so" "$PREFIX/lib/libphp.so"
          fi
          # Sanity-check the extracted toolchain. `ls -R | head` under
          # `set -o pipefail` drops out of the middle of ls's output,
          # trips SIGPIPE, and fails the step. Dump to a file, then
          # head a capped copy.
          ls -R "$PREFIX" > /tmp/prefix.ls
          head -n 50 /tmp/prefix.ls
          test -x "$PREFIX/bin/php-config"
          test -x "$PREFIX/bin/phpize"
          test -f "$PREFIX/lib/libphp.so"
          # Confirm phpize's hardcoded prefix resolves and its first
          # header is reachable - if not, the subsequent build-
          # parallel.sh exits silently at the phpize invocation.
          test "$("$PREFIX/bin/php-config" --prefix)" = "$PREFIX"
          test -f "$PREFIX/include/php/main/php.h"

      - name: Build parallel.so (vanilla + FFI-linked)
        # `bash -x` traces every command to the job log. The mirrored
        # build-parallel.sh redirects a lot of output to /dev/null for
        # cleanliness on a dev box; without xtrace the job log is
        # nearly empty when the script exits non-zero, and we can't
        # tell which step failed.
        run: bash -x scripts/build-parallel.sh

      - name: Pack parallel tarball
        id: pack
        run: |
          set -euo pipefail
          arch=$(uname -m)
          libc=glibc
          phpabi=$(echo "$LIBPHP_TAG" | sed 's/^libphp-//')
          asset="parallel-php${phpabi}-${arch}-${libc}.tar.gz"
          mkdir -p out
          # vanilla copy (under extensions/no-debug-zts-<api>/)
          ext_api_dir=$("$PREFIX/bin/php-config" --extension-dir | xargs -n1 basename)
          mkdir -p "out/extensions/${ext_api_dir}"
          cp "$PREFIX/lib/php/extensions/${ext_api_dir}/parallel.so" \
             "out/extensions/${ext_api_dir}/parallel.so"
          # FFI-linked copy (under extensions/ffi-zts/)
          mkdir -p out/extensions/ffi-zts
          cp "$PREFIX/lib/php/extensions/ffi-zts/parallel.so" \
             out/extensions/ffi-zts/parallel.so
          # parallel.so at root acts as the install marker the
          # Installer hook checks for.
          cp out/extensions/ffi-zts/parallel.so out/parallel.so
          tar czf "$asset" -C out .
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.asset }}
          path: ${{ steps.pack.outputs.asset }}
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/parallel-php') || github.event.inputs.release-tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release-tag || github.ref_name }}
          files: ${{ steps.pack.outputs.asset }}
          fail_on_unmatched_files: true
