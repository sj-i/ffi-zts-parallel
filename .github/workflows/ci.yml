name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ffi
          coverage: none
          tools: composer:v2
      - name: php -l on every PHP file
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
              php -l "$f" >/dev/null || fail=1
          done < <(find src tests examples -type f -name '*.php' -print0)
          [ -f run.php ] && php -l run.php >/dev/null
          exit $fail
      - name: composer validate
        run: composer validate --strict --no-check-publish

  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - name: Checkout ffi-zts-parallel
        uses: actions/checkout@v4
        with:
          path: parallel
      - name: Checkout ffi-zts (sibling)
        uses: actions/checkout@v4
        with:
          repository: sj-i/ffi-zts
          ref: main
          path: ffi-zts
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          coverage: none
          tools: composer:v2
      - name: Wire local sj-i/ffi-zts as a path repository
        working-directory: parallel
        run: |
          composer config minimum-stability dev
          composer config repositories.ffi-zts path ../ffi-zts
      - name: Install dependencies
        working-directory: parallel
        run: composer install --no-scripts --no-interaction --prefer-dist
      - name: Run PHPUnit (skipped if no tests yet)
        working-directory: parallel
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
              vendor/bin/phpunit --colors=always
          else
              echo "no PHPUnit config; skipping"
          fi
